# =============================================================================
# FILE: .github/workflows/orchestrator.yml
# PURPOSE: Top-level orchestrator — mirrors deploy_release_multiple_account.yaml
#
# PROBLEM BEING DEMONSTRATED:
#   When you run this with environments=prd, the deploy job fans out via matrix.
#   Each matrix entry calls account_deploy.yml, which calls _deploy_cdk.yml TWICE
#   (core + app). Each call hits `environment: ${{ inputs.environment }}` at the
#   job level in _deploy_cdk.yml. With prd having required reviewers, you get
#   N accounts × 2 calls × 1 gate = too many approval prompts.
#
# HOW TO REPLICATE THE PROBLEM:
#   1. Create environments in your repo: prd (with required reviewer = you), dev
#   2. Run this workflow with environments=prd, account_groups=team-alpha,team-beta
#   3. Watch: you get 4 approval prompts (2 accounts × 2 CDK calls each)
#      instead of the expected 1
#
# SOLUTION (commented out — see bottom of this file):
#   Add a single approve-prd gate job here before the matrix deploy job.
#   Pass prdv2 instead of prd into account_deploy.yml so _deploy_cdk.yml
#   sees a non-protected environment name and fires no gate.
# =============================================================================

name: "DEMO Orchestrator"

run-name: "Deploy ${{ inputs.tag }} to ${{ inputs.environments }} across ${{ inputs.account_groups }} by @${{ github.actor }}"

on:
  workflow_dispatch:
    inputs:
      environments:
        description: "Environments (comma-separated: dev,prd)"
        required: true
        default: "dev"
      account_groups:
        description: "Account groups (comma-separated: team-alpha,team-beta)"
        required: true
        default: "team-alpha"
      tag:
        description: "Tag or ref to deploy (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"

jobs:

  # ---------------------------------------------------------------------------
  # Builds the matrix of account+environment pairs to deploy
  # In the real system this reads from a JSON registry file.
  # Here we build it inline from the inputs for simplicity.
  # ---------------------------------------------------------------------------
  build-matrix:
    name: Build deployment matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}

    steps:
      - name: Generate matrix from inputs
        id: generate
        shell: bash
        run: |
          set -euo pipefail

          # Split comma-separated inputs into arrays
          IFS=',' read -ra ENVS    <<< "${{ github.event.inputs.environments }}"
          IFS=',' read -ra GROUPS  <<< "${{ github.event.inputs.account_groups }}"

          # Build a JSON array of {account_group, env} pairs
          # This mirrors what the real workflow reads from aws_account_group_registry.json
          entries="[]"
          for group in "${GROUPS[@]}"; do
            group=$(echo "$group" | xargs)   # trim whitespace
            for env in "${ENVS[@]}"; do
              env=$(echo "$env" | xargs)
              entries=$(echo "$entries" | jq \
                --arg g "$group" \
                --arg e "$env" \
                '. += [{"account_group": $g, "env": $e}]')
            done
          done

          MATRIX=$(echo "$entries" | jq -c '{"include": .}')
          echo "Generated matrix: $MATRIX"
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # ============================================================
  # PROBLEM: No single gate here. The gate fires inside
  # _deploy_cdk.yml once per call, so N accounts × 2 calls
  # = too many prompts.
  # ============================================================
  #
  # SOLUTION STEP 1 (uncomment the approve-prd job below, and
  # update the deploy job's `needs` and `if` accordingly):
  #
  # approve-prd:
  #   name: "Gate: Approve production deployment"
  #   needs: build-matrix
  #   # Only materialises when prd is actually in the environment list.
  #   # For dev-only runs this job is skipped entirely — no prompt.
  #   if: contains(github.event.inputs.environments, 'prd')
  #   runs-on: ubuntu-latest
  #   # THIS is the one and only place the prd protection rule fires.
  #   # One approval here unlocks all matrix legs simultaneously.
  #   environment: prd
  #   steps:
  #     - name: Approval granted
  #       run: |
  #         echo "Production deployment approved by ${{ github.actor }}"
  #         echo "All matrix legs will now proceed without further gates."
  # ---------------------------------------------------------------------------

  deploy:
    name: "Deploy ${{ matrix.account_group }} / ${{ matrix.env }}"

    # PROBLEM (current): only needs build-matrix, no gate
    needs: build-matrix

    # SOLUTION STEP 2: replace the needs/if above with these:
    # needs:
    #   - build-matrix
    #   - approve-prd
    # # Run if approve-prd succeeded (prd run) OR was skipped (dev/non-prd run).
    # # `always()` is needed here because approve-prd may be skipped,
    # # and by default a skipped `needs` job would block the dependent.
    # if: |
    #   always() &&
    #   needs.build-matrix.result == 'success' &&
    #   (needs.approve-prd.result == 'success' || needs.approve-prd.result == 'skipped')

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.build-matrix.outputs.matrix) }}

    uses: ./.github/workflows/account_deploy.yml

    with:
      account_group: ${{ matrix.account_group }}
      # PROBLEM (current): passes the real env name (prd) straight through.
      # _deploy_cdk.yml will fire a gate for every single call.
      environment: ${{ matrix.env }}

      # SOLUTION STEP 3: replace the environment line above with this expression.
      # prd  → prdv2  (prdv2 has no protection rules, so no gate fires in _deploy_cdk.yml)
      # anything else passes through unchanged
      # environment: ${{ matrix.env == 'prd' && 'prdv2' || matrix.env }}

      ref: ${{ github.event.inputs.tag }}

    secrets: inherit
