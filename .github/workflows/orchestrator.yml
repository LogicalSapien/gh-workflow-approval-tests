# =============================================================================
# FILE: .github/workflows/orchestrator.yml
# =============================================================================

name: "DEMO Orchestrator"

run-name: "Deploy ${{ inputs.tag }} to ${{ inputs.environments }} across ${{ inputs.account_groups }} by @${{ github.actor }}"

on:
  workflow_dispatch:
    inputs:
      environments:
        description: "Environments (comma-separated: dev,prod)"
        required: true
        default: "dev"
      account_groups:
        description: "Account groups (comma-separated: team-alpha,team-beta)"
        required: true
        default: "team-alpha"
      tag:
        description: "Tag or ref to deploy (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"

jobs:

  build-matrix:
    name: Build deployment matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}

    steps:
      - name: Generate matrix from inputs
        id: generate
        shell: bash
        run: |
          set -euo pipefail

          # Use jq to split and trim in one step — avoids shell variable naming
          # issues (e.g. `env` is a reserved name) and quoting edge cases
          ENVS_JSON=$(echo '${{ github.event.inputs.environments }}' \
            | jq -Rc 'split(",") | map(ltrimstr(" ") | rtrimstr(" "))')

          GROUPS_JSON=$(echo '${{ github.event.inputs.account_groups }}' \
            | jq -Rc 'split(",") | map(ltrimstr(" ") | rtrimstr(" "))')

          echo "Environments : $ENVS_JSON"
          echo "Account groups: $GROUPS_JSON"

          # Cartesian product via jq — clean, no bash loop
          MATRIX=$(jq -cn \
            --argjson envs   "$ENVS_JSON" \
            --argjson groups "$GROUPS_JSON" \
            '{
              include: [
                $groups[] as $g |
                $envs[]   as $e |
                { account_group: $g, env: $e }
              ]
            }')

          echo "Generated matrix:"
          echo "$MATRIX" | jq .

          COUNT=$(echo "$MATRIX" | jq '.include | length')
          echo "Total matrix entries: $COUNT"

          if [ "$COUNT" -eq 0 ]; then
            echo "ERROR: Matrix is empty — check your inputs"
            exit 1
          fi

          echo "matrix=$(echo "$MATRIX" | jq -c .)" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # PROBLEM: No gate here — fires once per _deploy_cdk.yml call instead
  # ---------------------------------------------------------------------------
  #
  # SOLUTION: uncomment approve-prod below and update the deploy job
  #
  approve-prod:
    name: "Gate: Approve production deployment"
    needs: build-matrix
    if: contains(github.event.inputs.environments, 'prd')
    runs-on: ubuntu-latest
    environment: prd         # ← the ONE place the prod gate fires
    steps:
      - name: Approval granted
        run: |
          echo "Approved by ${{ github.actor }} — all matrix legs will now proceed"
  # ---------------------------------------------------------------------------

  deploy:
    name: "Deploy ${{ matrix.account_group }} / ${{ matrix.env }}"

    # PROBLEM: no gate coordination
    # needs: build-matrix

    # SOLUTION: replace needs + if above with:
    needs:
      - build-matrix
      - approve-prod
    if: |
      always() &&
      needs.build-matrix.result == 'success' &&
      (needs.approve-prod.result == 'success' || needs.approve-prod.result == 'skipped')

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.build-matrix.outputs.matrix) }}

    uses: ./.github/workflows/account_deploy.yml
    with:
      account_group: ${{ matrix.account_group }}
      # PROBLEM: passes real env name → gate fires in _deploy_cdk.yml every call
      environment: ${{ matrix.env }}
      # SOLUTION: replace line above with:
      # environment: ${{ matrix.env == 'prod' && 'prodv2' || matrix.env }}
      ref: ${{ github.event.inputs.tag }}
    secrets: inherit
