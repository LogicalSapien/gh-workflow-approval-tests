# =============================================================================
# FILE: .github/workflows/_deploy_cdk.yml
# PURPOSE: Reusable CDK deployment — mirrors the real _deploy_cdk.yml
#          Lives in a shared utils repo used by 100+ workflows.
#          Changes here MUST be backward compatible.
#
# PROBLEM BEING DEMONSTRATED:
#   This line:
#       environment: ${{ inputs.environment }}
#   at the job level causes GitHub to evaluate environment protection rules
#   every time this workflow is called. When inputs.environment == 'prd' and
#   prd has required reviewers, an approval prompt appears. Since this file is
#   called N×2 times (N accounts × core+app), you get N×2 prompts.
#
# SOLUTION OVERVIEW (backward compatible):
#   1. Keep `environment: ${{ inputs.environment }}` unchanged.
#      When callers pass 'prdv2' (a non-protected env name), no gate fires.
#      When other callers (100+ workflows) pass 'prd' directly, gate fires
#      exactly as before — zero change in their behaviour.
#
#   2. Add a "Resolve environment" step as the VERY FIRST step.
#      It maps prdv2 → prd and writes ENVIRONMENT + ENV_NAME to $GITHUB_ENV.
#
#   3. Change all step-level `if:` conditions and shell commands that previously
#      read `inputs.environment` to instead read `env.ENVIRONMENT`.
#      The env context IS available in step-level if: expressions.
#      (It is NOT available in job-level if: — but we don't need it there.)
#
# BACKWARD COMPATIBILITY PROOF:
#   Caller passes 'prd'   → environment: prd   → gate fires → ENVIRONMENT=prd  ✅ same as before
#   Caller passes 'dev'   → environment: dev   → no gate   → ENVIRONMENT=dev   ✅ same as before
#   Caller passes 'prdv2' → environment: prdv2 → no gate   → ENVIRONMENT=prd   ✅ new path only
# =============================================================================

name: "DEMO CDK Deploy (reusable)"

on:
  workflow_call:
    inputs:
      stack_name:
        description: "CDK stack to deploy"
        required: true
        type: string
      environment:
        description: "Target environment. Pass 'prdv2' to skip gate (orchestrator usage)."
        required: true
        type: string
      account_group:
        description: "AWS account group"
        required: false
        type: string
        default: "default-group"
      ref:
        description: "Git ref to deploy"
        required: false
        type: string
        default: "main"

jobs:
  deploy:
    name: "CDK deploy ${{ inputs.stack_name }} → ${{ inputs.account_group }} ${{ inputs.environment }}"
    runs-on: ubuntu-latest

    # =========================================================================
    # PROBLEM: This line fires an approval gate whenever inputs.environment
    # matches a protected environment name (e.g. 'prd').
    # Called N×2 from the orchestrator → N×2 approval prompts.
    #
    # This line is INTENTIONALLY LEFT UNCHANGED in the solution.
    # The fix is in the CALLER (account_deploy.yml) which passes 'prdv2'
    # instead of 'prd'. Since 'prdv2' has no protection rules, no gate fires.
    # The Resolve environment step below then maps prdv2 → prd internally.
    # =========================================================================
    environment: ${{ inputs.environment }}

    # env block: deliberately does NOT set ENVIRONMENT or ENV_NAME here.
    # If we set them from inputs.environment, they'd contain 'prdv2' for the
    # new orchestrator path. The Resolve environment step sets them correctly.
    env:
      STACK_NAME: ${{ inputs.stack_name }}
      ACCOUNT_GROUP: ${{ inputs.account_group }}
      REF: ${{ inputs.ref }}

    steps:

      # =======================================================================
      # SOLUTION STEP A — Resolve environment (must be the very first step)
      #
      # Maps the gate-bypass alias back to the real environment name.
      # All steps below this one read $ENVIRONMENT (or env.ENVIRONMENT in if:)
      # rather than ${{ inputs.environment }}.
      #
      # Backward compatible: for any input other than 'prdv2', RESOLVED == input.
      # The 100+ existing callers that pass 'prd' directly get ENVIRONMENT=prd
      # exactly as they did before this step existed.
      # =======================================================================

      # =============================================================================
      # SOLUTION: Resolve environment
      #
      # Normalises the gate-bypass alias 'prdv2' back to 'prd', BUT ONLY when
      # called through the expected orchestrator chain. This prevents any accidental
      # or malicious use of 'prdv2' from bypassing the gate in other call paths.
      #
      # All three conditions must be true to trigger normalisation:
      #   1. inputs.environment == 'prdv2'          (bypass alias was passed)
      #   2. this_workflow      == 'orchestrator.yml' (top level is the orchestrator)
      #   3. referenced_workflows contains 'account_deploy.yml' (went via middle layer)
      #
      # For all other callers (100+ workflows passing 'prd' directly):
      #   - inputs.environment == 'prd' → condition 1 is false → RESOLVED='prd' as-is
      #   - Backward compatible: behaviour is identical to before this step existed
      # =============================================================================
      - name: Resolve environment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
    
          RAW="${{ inputs.environment }}"
          RESOLVED="$RAW"
    
          echo "Raw input environment : $RAW"
    
          # check if the caller chain matches orchestrator
          if [ "$RAW" = "prdv2" ]; then
    
            # Query the run that contains THIS job.
            RUN_DATA=$(gh api \
              /repos/${{ github.repository }}/actions/runs/${{ github.run_id }})
    
            THIS_WORKFLOW=$(echo "$RUN_DATA" | jq -r '.path // ""')
    
            REFERENCED=$(echo "$RUN_DATA" | jq -r '[.referenced_workflows[]?.path] | join("|")')
    
            echo "this_workflow        : $THIS_WORKFLOW"
            echo "referenced_workflows : $REFERENCED"
    
            # top-level run must be the orchestrator
            # account_deploy.yml must appear in the referenced chain
            if echo "$THIS_WORKFLOW" | grep -q "orchestrator.yml" && \
               echo "$REFERENCED"    | grep -q "account_deploy.yml"; then
    
              RESOLVED="prd"
              echo "Caller chain originated from Orchestrator"
    
            else
              # prdv2 was passed but NOT from the trusted chain.
              echo "prdv2 passed but caller chain is NOT the trusted orchestrator path"
              echo "   this_workflow : $THIS_WORKFLOW"
              echo "   referenced    : $REFERENCED"
              echo "   RESOLVED stays as: $RESOLVED"
            fi
    
          else
            echo "Standard environment name — no resolution needed"
          fi
    
          echo "Resolved environment : $RESOLVED"
    
          # Write to GITHUB_ENV for all subsequent steps
          echo "ENVIRONMENT=$RESOLVED" >> "$GITHUB_ENV"
          echo "ENV_NAME=$RESOLVED"    >> "$GITHUB_ENV"

      # =======================================================================
      # Without the solution, set ENVIRONMENT directly from inputs so the steps
      # below work for the purpose of this demo (they'll contain 'prdv2' when
      # called via the orchestrator path, which is exactly the bug).
      # =======================================================================
      # - name: "Set ENVIRONMENT from input (PROBLEM version — remove when solution active)"
      #   run: |
      #     echo "ENVIRONMENT=${{ inputs.environment }}" >> "$GITHUB_ENV"
      #     echo "ENV_NAME=${{ inputs.environment }}"    >> "$GITHUB_ENV"

      # -----------------------------------------------------------------------
      - name: "Show resolved context"
        run: |
          echo "## CDK Deploy Context" >> "$GITHUB_STEP_SUMMARY"
          echo "| Variable | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| inputs.environment (raw) | ${{ inputs.environment }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ENVIRONMENT (resolved)   | ${{ env.ENVIRONMENT }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| stack_name               | ${{ env.STACK_NAME }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| account_group            | ${{ env.ACCOUNT_GROUP }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ref                      | ${{ env.REF }} |" >> "$GITHUB_STEP_SUMMARY"

          # Highlight the bug vs the fix in the summary
          if [ "${{ inputs.environment }}" = "prdv2" ] && [ "$ENVIRONMENT" = "prdv2" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "> ⚠️ **BUG VISIBLE**: ENVIRONMENT=prdv2 — CDK would receive wrong env name" >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ inputs.environment }}" = "prdv2" ] && [ "$ENVIRONMENT" = "prd" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "> ✅ **SOLUTION ACTIVE**: inputs=prdv2 correctly resolved to ENVIRONMENT=prd" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Show caller info
        run: |
          echo "Workflow name     : ${{ github.workflow }}"
          echo "Run ID            : ${{ github.run_id }}"
          echo "Triggering actor  : ${{ github.actor }}"
          echo "Triggering event  : ${{ github.event_name }}"


      - name: Find caller workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get the current run's info — it contains the parent run ID
          CURRENT_RUN=$(gh api /repos/${{ github.repository }}/actions/runs/${{ github.run_id }})
      
          # The triggering workflow is referenced here
          TRIGGER_WORKFLOW=$(echo "$CURRENT_RUN" | jq -r '.triggering_actor.login')
          REFERENCED_WORKFLOWS=$(echo "$CURRENT_RUN" | jq -r '.referenced_workflows[]?.path // "none"')
      
          echo "Triggered by user : $TRIGGER_WORKFLOW"
          echo "Referenced workflows (callers):"
          echo "$REFERENCED_WORKFLOWS"

      - name: Show full caller chain
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api /repos/${{ github.repository }}/actions/runs/${{ github.run_id }} \
            --jq '
              {
                this_run_id:   .id,
                this_workflow: .path,
                caller_workflows: [
                  .referenced_workflows[]? |
                  {
                    path: .path,
                    ref:  .ref,
                    sha:  .sha
                  }
                ]
              }
            '          

      - name: Trace caller chain
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "## Caller Chain" >> "$GITHUB_STEP_SUMMARY"
          echo "| Level | Workflow | Ref |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- | --- |" >> "$GITHUB_STEP_SUMMARY"
    
          gh api /repos/${{ github.repository }}/actions/runs/${{ github.run_id }} \
            --jq '.referenced_workflows[]? | "| caller | \(.path) | \(.ref) |"' \
            >> "$GITHUB_STEP_SUMMARY"
    
          echo "| current | ${{ github.workflow }} | ${{ github.ref }} |" \
            >> "$GITHUB_STEP_SUMMARY"     

      # -----------------------------------------------------------------------
      - name: "Simulate CDK command"
        run: |
          echo "Running CDK deploy..."
          echo "  cdk deploy --context environment=$ENVIRONMENT --context account_group=$ACCOUNT_GROUP $STACK_NAME"
          echo ""
          echo "CDK sees environment: $ENVIRONMENT  (must be 'prd' not 'prdv2')"

      # -----------------------------------------------------------------------
      # PROBLEM: This condition reads inputs.environment directly.
      # When called via orchestrator with prdv2, it evaluates to false
      # even for production — audit report is silently skipped.
      #
      # SOLUTION STEP B: change inputs.environment == 'prd'
      #                  to    env.ENVIRONMENT    == 'prd'
      # env context is available in step-level if: expressions.
      # -----------------------------------------------------------------------
      - name: "Simulate audit report (prd only)"
        # PROBLEM version — will NOT run when called with prdv2:
        # if: inputs.environment == 'prd'
        # SOLUTION: replace the line above with:
        if: env.ENVIRONMENT == 'prd'
        run: |
          echo "Generating audit report for production deployment"
          echo "  Stack:   $STACK_NAME"
          echo "  Account: $ACCOUNT_GROUP"
          echo "  Env:     $ENVIRONMENT"

      - name: "Simulate uat-or-prd step (install extra dependencies)"
        # PROBLEM version — will NOT run when called with prdv2:
        # if: inputs.environment == 'prd' || inputs.environment == 'uat'
        # SOLUTION: replace the line above with:
        if: env.ENVIRONMENT == 'prd' || env.ENVIRONMENT == 'uat'
        run: |
          echo "Installing production-grade dependencies..."
          echo "  (This step is silently skipped in the PROBLEM version when env=prdv2)"

      - name: "Simulate release note update (prd + tag only)"
        # PROBLEM version:
        # if: inputs.environment == 'prd' && startsWith(github.ref, 'refs/tags/')
        # SOLUTION:
        if: env.ENVIRONMENT == 'prd' && startsWith(github.ref, 'refs/tags/')
        run: |
          echo "Updating release notes for ${{ github.ref_name }}"

      - name: "Simulate repo report update"
        # PROBLEM version — will NOT run for prdv2 even though it should:
        # if: |
        #   inputs.environment == 'prd' ||
        #   inputs.environment == 'stg' ||
        #   inputs.environment == 'tst'
        # SOLUTION:
        if: |
          env.ENVIRONMENT == 'prd' ||
          env.ENVIRONMENT == 'stg' ||
          env.ENVIRONMENT == 'tst'
        run: |
          echo "Updating repo report for environment: $ENVIRONMENT"

      # -----------------------------------------------------------------------
      - name: "Final summary"
        run: |
          echo "CDK deploy complete for $STACK_NAME in $ENVIRONMENT ($ACCOUNT_GROUP)"
